apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: mern

spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend
        image: poornimau/mern-frontend:v2
        imagePullPolicy: Always

        ports:
        - containerPort: 3000
