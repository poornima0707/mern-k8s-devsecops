name: MERN CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-scan-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
          --region ${{ secrets.AWS_REGION }} \
          --name ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Backend Dependencies
        working-directory: Application-Code/backend
        run: npm install

      - name: Install Frontend Dependencies
        working-directory: Application-Code/frontend
        run: npm install

      - name: Build Frontend
        working-directory: Application-Code/frontend
        env:
          NODE_OPTIONS: --openssl-legacy-provider
          REACT_APP_BACKEND_URL: http://backend-service:3500/api/tasks
        run: npm run build

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mern-backend:v3 ./Application-Code/backend

      - name: Build Frontend Image
        run: |
          docker build \
          --build-arg REACT_APP_BACKEND_URL=http://backend-service:3500/api/tasks \
          -t ${{ secrets.DOCKER_USERNAME }}/mern-frontend:v3 \
          ./Application-Code/frontend

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Scan Backend Image
        run: trivy image ${{ secrets.DOCKER_USERNAME }}/mern-backend:v3

      - name: Scan Frontend Image
        run: trivy image ${{ secrets.DOCKER_USERNAME }}/mern-frontend:v3

      - name: Push Backend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/mern-backend:v3

      - name: Push Frontend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/mern-frontend:v3

      - name: Update Kubernetes Images
        run: |
          kubectl set image deployment/backend backend=${{ secrets.DOCKER_USERNAME }}/mern-backend:v3 -n mern
          kubectl set image deployment/frontend frontend=${{ secrets.DOCKER_USERNAME }}/mern-frontend:v3 -n mern

      - name: Verify Rollout
        run: |
          kubectl rollout status deployment/backend -n mern
          kubectl rollout status deployment/frontend -n mern
