name: MERN CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Backend Dependencies
        working-directory: Application-Code/backend
        run: npm install

      - name: Install Frontend Dependencies
        working-directory: Application-Code/frontend
        run: npm install

      - name: Build Frontend
        working-directory: Application-Code/frontend
        run: npm run build

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mern-backend:v1 ./Application-Code/backend

      - name: Build Frontend Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/mern-frontend:v1 ./Application-Code/frontend

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Scan Backend Image
        run: trivy image ${{ secrets.DOCKER_USERNAME }}/mern-backend:v1

      - name: Scan Frontend Image
        run: trivy image ${{ secrets.DOCKER_USERNAME }}/mern-frontend:v1

      - name: Push Backend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/mern-backend:v1

      - name: Push Frontend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/mern-frontend:v1
