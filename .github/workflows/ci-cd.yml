name: MERN CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install Backend Dependencies
      run: |
        cd Application-Code/backend
        npm install

    - name: Install Frontend Dependencies
      run: |
        cd Application-Code/frontend
        npm install

    - name: Docker Login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Backend Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/mern-backend:v1 Application-Code/backend
        docker push ${{ secrets.DOCKER_USERNAME }}/mern-backend:v1

    - name: Build Frontend Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/mern-frontend:v1 Application-Code/frontend
        docker push ${{ secrets.DOCKER_USERNAME }}/mern-frontend:v1

    - name: Deploy to Kubernetes
      run: |
        echo "${{ secrets.KUBECONFIG }}" > kubeconfig
        export KUBECONFIG=kubeconfig

        kubectl apply -f Application-Code/k8s/
